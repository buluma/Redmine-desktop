name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger when pushing tags starting with v, e.g. v1.0.11

# Grant workflow write permissions
permissions:
  contents: write

jobs:
  # Build macOS version (arm64 only)
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Build arm64 only. --publish never: electron-builder >=26 auto-publishes to
      # GitHub the moment it sees a tag + GH_TOKEN, which races with (and breaks)
      # the dedicated `release` job below that assembles the full, changelog'd release.
      - name: Build Electron app
        run: npm run build -- --mac --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            release/*/*.dmg
            release/*/*.zip
            release/*/*.blockmap
            release/*/latest-mac.yml

  # Build Windows version
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Electron app
        run: npm run build -- --win --x64 --ia32 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            release/*/*.exe
            release/*/*.zip
            release/*/*.blockmap
            release/*/latest.yml

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Fetch full git history for generating release notes
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: artifacts/macos
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.zip" -o -name "*.blockmap" -o -name "latest*.yml" \) -exec cp {} release-files/ \;
          ls -la release-files/
      
      - name: Generate Release Notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${{ github.ref_name }}
          
          echo "Previous tag: $PREV_TAG"
          echo "Current tag: $CURRENT_TAG"
          
          # Generate release notes
          echo "## Changes" > release-notes.md
          echo "" >> release-notes.md
          
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> release-notes.md
            echo "" >> release-notes.md
            echo "" >> release-notes.md
            echo "---" >> release-notes.md
            echo "**Full Changelog**: [${PREV_TAG}...${CURRENT_TAG}](https://github.com/buluma/Redmine-desktop/compare/${PREV_TAG}...${CURRENT_TAG})" >> release-notes.md
          else
            git log --pretty=format:"- %s (%h)" -10 >> release-notes.md
          fi
          
          echo ""
          echo "Generated release notes:"
          cat release-notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          files: release-files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
